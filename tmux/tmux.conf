# Set prefix to Ctrl-Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Split panes (matching Ghostty style)
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"

# Toggle zoom/expand pane
bind S-Enter resize-pane -Z

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Enable mouse support
set -g mouse on

# Scroll history
set -g history-limit 50000

# Copy/paste with system clipboard (macOS)
set -g set-clipboard on
setw -g mode-keys vi

# Copy to system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Enter copy mode with v, select with v, yank with y
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Status bar style
set -g status-style 'bg=cyan fg=black'

# Pane border style
set -g pane-border-style 'fg=cyan'
set -g pane-active-border-style 'fg=cyan'
