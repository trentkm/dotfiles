# Set prefix to Ctrl-Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# No escape delay (important for vim)
set -sg escape-time 0

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Auto-renumber windows when one is closed
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Allow passthrough for escape sequences (needed for cmux notifications)
set -g allow-passthrough on

# Split panes (matching Ghostty style)
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"

# Toggle zoom/expand pane
bind S-Enter resize-pane -Z

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing with prefix + Shift+hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows with Shift+arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# Enable mouse support
set -g mouse on

# Scroll history
set -g history-limit 50000

# Copy/paste with system clipboard (macOS)
set -g set-clipboard on
setw -g mode-keys vi

# Copy to system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Enter copy mode with v, select with v, yank with y
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Status bar (Material Darker) ──
set -g status-style 'bg=#2a2a2a fg=#616161'
set -g status-left-length 30
set -g status-right-length 60
set -g status-left '#[fg=#c0c0c0,bold] #{session_name} #[default]'
set -g status-right '#(agmux status) #[fg=#616161]%H:%M#[default] '
set -g status-interval 2

# Window indicators — circles with window number
setw -g window-status-format '#[fg=#909090] ○ '
setw -g window-status-current-format '#[fg=#c0c0c0,bold] ● '

# Agent popup (prefix+b)
bind b run-shell 'agmux toggle'

# Pane borders
set -g pane-border-style 'fg=#292929'
set -g pane-active-border-style 'fg=#82AAFF'

# --- Floating popups ---
# Lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Scratch terminal (persistent across toggles)
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E \
  "tmux new-session -A -s scratch"

# fzf file finder → opens in $EDITOR
bind f display-popup -d "#{pane_current_path}" -w 60% -h 60% -E \
  "fd --type f | fzf --preview 'bat --color=always {}' | xargs nvim"

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'

# Thumbs config
set -g @thumbs-key Space

# Auto-restore sessions
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
